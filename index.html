<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>日プ新世界メーカー</title>

<style>
  :root{
    --bg:#f6f6f6;
    --card:#ffffff;
    --line:#e6e6e6;
    --text:#111;
    --muted:#666;
    --shadow: 0 4px 14px rgba(0,0,0,.06);
    --radius:14px;

    --accent:#0080ff;
    --blue: var(--accent);

    --slot: 86px;
    --gap:  14px;

    --exAvatar: 112px;
    --exBorder: 8px;
    --exGapX: 56px;
    --exGapY: 30px;
    --exName: 15px;

    --exHandle: 13px;
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  header{
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .topbar{ padding: 12px 12px 10px; max-width: 980px; margin: 0 auto; }
  h1{margin:0;font-size:20px;line-height:1.2}

  main{max-width:980px;margin:0 auto;padding:12px;}
  .card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .banner{
    height: 110px;
    position: relative;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,120,200,.30), transparent 40%),
      radial-gradient(circle at 80% 40%, rgba(120,160,255,.28), transparent 45%),
      linear-gradient(135deg, #ffe7f4, #eef3ff);
  }
  .banner.hasImage{ background-size: cover; background-position: center; }
  .banner::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(to bottom, rgba(255,255,255,.0), rgba(255,255,255,.35));
    pointer-events:none;
  }
  .bannerTitle{
    position:relative;
    font-weight: 900;
    letter-spacing: .06em;
    padding: 10px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,.78);
    border: 1px solid rgba(255,255,255,.9);
    font-size: 14px;
    z-index: 2;
    white-space: nowrap;
  }

  .picksWrap{
    padding: 12px 14px 8px;
    background-image: url("https://i.imgur.com/lFGbXfI.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .picksRow{
    display:flex;
    justify-content:center;
    gap: var(--gap);
    flex-wrap: wrap;
    row-gap: 14px;
    padding: 12px 0 10px;
  }
  .slot{ width: var(--slot); text-align:center; }

  .avatar{
    width: var(--slot);
    height: var(--slot);
    border-radius:999px;
    border: 5px solid var(--blue);
    background:#fff;
    overflow: visible;
    box-shadow: 0 8px 18px rgba(0,0,0,.10);
    margin: 0 auto;
    position:relative;
    z-index: 1;
  }
  .avatar img{
    width:100%;
    height:100%;
    border-radius:999px;
    object-fit: cover;
    object-position: 50% 35%;
    display:block;
    image-rendering: auto;
    transform: translateZ(0);
    backface-visibility: hidden;
  }
  .rank{
    position:absolute;
    left:50%;
    bottom:-12px;
    transform: translateX(-50%);
    background: var(--blue);
    color:#fff;
    border-radius:999px;
    font-weight:900;
    font-size: 9px;
    padding: 6px 8px;
    line-height:1;
    min-width: 2.0em;
    text-align:center;
    z-index: 2;
    box-shadow: 0 6px 14px rgba(0,0,0,.18);
    pointer-events:none;
  }
  .name{
    margin-top: 14px;
    font-size: 12px;
    font-weight: 900;
    line-height: 1.1;
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
  }
  .empty .avatar{
    opacity:.16;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 34px;
    font-weight: 900;
    color:#555;
  }
  .empty .rank{display:none;}
  .empty .name{display:none;}

  .slot.colorTarget .avatar{
    outline: 4px solid rgba(0,0,0,.12);
    outline-offset: 3px;
  }

  .reorder{ display:none; gap:10px; justify-content:center; margin-top: 8px; }
  body.reorder-on .reorder{ display:flex; }
  .reorder button{
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid #ddd;
    background: #fff;
    font-size: 16px;
    line-height: 1;
  }

  .actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    padding: 10px 10px 12px;
    border-top: 1px solid #f1f1f1;
    background:#fff;
  }
  button{
    padding: 11px 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #fff;
    font-size: 14px;
  }
  button:active{transform:scale(.98)}
  .primary{border-color:#cfe2ff;}
  .danger{border-color:#ffd6d6;}
  .mode{border-color:#e7e7e7;}

  .tiktokBtn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding: 11px 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 900;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(135deg, #000000, #222222);
    border: 1px solid #111;
    box-shadow: 0 6px 14px rgba(0,0,0,.18);
  }
  .tiktokBtn:active{ transform: scale(.98); }
  .tiktokHint{
    margin-top: 6px;
    font-size: 13px;
    font-weight: 900;
    color: #555;
    text-align: center;
    letter-spacing: .02em;
  }
  .tiktokWrap{ display:flex; flex-direction:column; align-items:center; }

  .limitControl{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .limitLabel{ font-size:12px; font-weight:900; color:#666; }
  .limitBtns{
    display: grid;
    grid-template-columns: repeat(4, 44px);
    gap: 8px;
    justify-content: center;
  }
  .limitBtnActive{ border-color:#cfe2ff; background:#eef6ff; font-weight: 1000; }

  .colorControl{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    padding: 2px 6px;
  }
  .palette{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
  }
  .colorSwatch{
    width: 30px;
    height: 30px;
    border-radius: 999px;
    border: 2px solid rgba(0,0,0,.10);
    box-shadow: 0 6px 14px rgba(0,0,0,.10);
    cursor:pointer;
    background: #000;
  }
  .colorSwatch.active{
    outline: 3px solid rgba(0,0,0,.12);
    border-color: rgba(0,0,0,.25);
    transform: scale(1.03);
  }
  .colorPicker{
    width: 40px;
    height: 30px;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 0;
    background:#fff;
  }

  .listCard{
    margin-top: 12px;
    padding: 10px;
    background-image: url("https://i.imgur.com/lUMY5QA.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border:1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .sectionTitle{
    font-size: 18px;
    font-weight: 900;
    padding: 6px 2px 10px;
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.35);
  }

  .searchRow{ display:flex; gap:10px; align-items:center; margin-bottom: 10px; }
  .search{
    flex:1;
    display:flex;
    align-items:center;
    border:1px solid #ddd;
    border-radius: 12px;
    padding: 10px 12px;
    background:#fff;
  }
  .search input{ border:none; outline:none; width:100%; font-size: 15px; background:transparent; }
  #membersWrap{
    max-height: 52vh;
    overflow:auto;
    -webkit-overflow-scrolling: touch;
    border-top:1px solid #f1f1f1;
    padding-top: 6px;
    overscroll-behavior: contain;
  }
  .membersGrid{
    display:grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap:12px;
    padding: 10px 6px 6px;
  }
  .memberCard{
    border: 1px solid #e8e8e8;
    border-radius: 16px;
    background: #fff;
    box-shadow: 0 4px 14px rgba(0,0,0,.06);
    padding: 12px 10px 10px;
    cursor:pointer;
    user-select:none;
    text-align:center;
    position:relative;
  }
  .memberCard:active{ transform:scale(.99); }

  .memberCardThumb{
    width:100%;
    aspect-ratio: 1 / 1;
    border-radius: 14px;
    overflow:hidden;
    background:#f7f7f7;
    border:1px solid #f0f0f0;
    position: relative;
  }
  .memberCardThumb img{
    width:100%;
    height:100%;
    object-fit: cover;
    object-position: 50% 20%;
    display:block;
    image-rendering: auto;
    transform: translateZ(0);
    backface-visibility: hidden;
  }
  .memberCardName{ margin-top:10px; font-weight:900; font-size:14px; line-height:1.2; }
  .memberCardSub{ margin-top:4px; font-size:12px; color: var(--muted); }
  .memberCard.selected{ opacity:.35; filter: grayscale(1); pointer-events:none; }
  .memberCardProfile{
    position:absolute;
    right:10px;
    top:10px;
    font-size:12px;
    font-weight:900;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid #cfe2ff;
    color: var(--blue);
    background: rgba(255,255,255,.92);
    text-decoration:none;
    line-height:1;
  }

  .memberCard.withdrawn{
    opacity: .45;
    filter: grayscale(1);
    cursor: default;
  }
  .memberCard.withdrawn:active{ transform:none; }
  .withdrawnBadge{
    position: absolute;
    left: 10px;
    top: 10px;
    padding: 8px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.9);
    border: 1px solid rgba(0,0,0,.08);
    font-weight: 1000;
    font-size: 12px;
    color: #111;
    box-shadow: 0 8px 18px rgba(0,0,0,.10);
  }
  .memberCard.withdrawn .memberCardProfile{ opacity:.65; }

  .toast{
    position: fixed;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    background: rgba(0,0,0,.78);
    color:#fff;
    padding: 10px 12px;
    border-radius: 999px;
    font-size: 13px;
    display:none;
    z-index:999;
  }

  #exportArea{
    position: fixed;
    left: -10000px;
    top: 0;
    width: 1004px;
    height: 1040px;
    background: #ffffff;
    overflow: hidden;
  }
  #exportInner{
    width: 1004px;
    height: 1040px;
    position: relative;
    background:#fff;
    overflow:hidden;
    background-image: url("https://i.imgur.com/lFGbXfI.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .exportBanner{
    height: 150px;
    background-size: cover;
    background-position: center;
    position:relative;
  }
  .exportBanner::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(to bottom, rgba(255,255,255,.0), rgba(255,255,255,.35));
    pointer-events:none;
  }
  .exportTitlePill{
    position:absolute;
    left:50%;
    top: 50%;
    transform: translate(-50%,-50%);
    font-weight: 900;
    letter-spacing: .06em;
    padding: 12px 20px;
    border-radius: 999px;
    background: rgba(255,255,255,.78);
    border: 1px solid rgba(255,255,255,.92);
    font-size: 20px;
    color:#111;
    white-space: nowrap;
    z-index: 2;
  }
  .exportCredit{
    position:absolute;
    top: 18px;
    right: 22px;
    font-size: 14px;
    font-weight: 900;
    color: rgba(0,0,0,.55);
    background: rgba(255,255,255,.72);
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.85);
    z-index: 120;
    backdrop-filter: blur(6px);
    pointer-events:none;
  }

  .exportTikTok,
  .exportHashtag{
    position:absolute;
    bottom: 14px;
    z-index: 120;
    pointer-events:none;
    white-space: nowrap;

    background: linear-gradient(135deg,
      rgba(255,255,255,.72),
      rgba(255,255,255,.42)
    );
    border: 1px solid rgba(255,255,255,.55);
    border-bottom-color: rgba(255,255,255,.32);
    border-right-color: rgba(255,255,255,.32);

    backdrop-filter: blur(12px) saturate(155%);
    -webkit-backdrop-filter: blur(12px) saturate(155%);

    box-shadow:
      0 14px 30px rgba(0,0,0,.14),
      inset 0 1px 0 rgba(255,255,255,.75),
      inset 0 -1px 0 rgba(255,255,255,.18);

    border-radius: 999px;
    padding: 8px 12px;

    color: rgba(10,10,10,.88);
    font-weight: 1000;
    text-shadow:
      0 1px 0 rgba(255,255,255,.70),
      0 0 6px rgba(255,255,255,.22);

    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .exportTikTok::before,
  .exportHashtag::before{
    content:"";
    position:absolute;
    inset: 1px;
    border-radius: 999px;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,.55),
      rgba(255,255,255,0) 55%
    );
    pointer-events:none;
    mix-blend-mode: screen;
    opacity: .55;
  }
  .exportTikTok{ left: 18px; font-size: 14px; }
  .exportHashtag{ right: 18px; font-size: 13px; letter-spacing: .03em; }

  .exportBody{
    height: calc(1040px - 150px);
    padding: 18px 56px 0;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .exportTop{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
  }
  .exportRows{
    width: 100%;
    display:flex;
    flex-direction:column;
    gap: var(--exGapY);
    align-items:center;
    justify-content:center;
  }
  .exportRow{
    display:flex;
    justify-content:center;
    gap: var(--exGapX);
    width: 100%;
  }

  .exportSlot{
    width: calc(var(--exAvatar) + 90px);
    text-align:center;
    position: relative;
  }
  .exportAvatar{
    width: var(--exAvatar);
    height: var(--exAvatar);
    border-radius:999px;
    border: var(--exBorder) solid var(--blue);
    overflow: visible;
    background:#fff;
    margin: 0 auto;
    box-shadow: 0 10px 22px rgba(0,0,0,.10);
    position:relative;
  }
  .exportPhoto{
    width:100%;
    height:100%;
    border-radius:999px;
    background-size: cover;
    background-position: 50% 35%;
    background-repeat: no-repeat;
    image-rendering: auto;
    transform: translateZ(0);
    backface-visibility: hidden;
  }
  .exportRank{
    position:absolute;
    left:50%;
    bottom:-14px;
    transform: translateX(-50%);
    background: var(--blue);
    color:#fff;
    border-radius:999px;
    font-weight:900;
    font-size: 12px;
    padding: 7px 10px;
    line-height:1;
    min-width: 2.2em;
    text-align:center;
    box-shadow: 0 8px 16px rgba(0,0,0,.18);
    pointer-events:none;
  }
  .exportName{
    margin-top: 16px;
    font-size: var(--exName);
    font-weight: 900;
    line-height: 1.15;
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
  }
  .exportHandle{
    margin-top: 6px;
    font-size: var(--exHandle);
    font-weight: 900;
    color: rgba(0,0,0,.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.1;
    height: calc(var(--exHandle) * 1.1);
  }

  .introModal{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    padding: 18px;
  }
  .introModal.show{ display:flex; }

  .introBox.glass{
    width: min(520px, 92vw);
    position: relative;
    background: linear-gradient(135deg, rgba(255,255,255,.82), rgba(255,255,255,.48));
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 22px 60px rgba(0,0,0,.28),
      inset 0 1px 0 rgba(255,255,255,.75),
      inset 0 -1px 0 rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.38);
    backdrop-filter: blur(12px) saturate(155%);
    -webkit-backdrop-filter: blur(12px) saturate(155%);
  }
  .introBox.glass::before{
    content:"";
    position:absolute;
    left:-20%;
    top:-30%;
    width:140%;
    height:60%;
    background: linear-gradient(135deg, rgba(255,255,255,.65), rgba(255,255,255,0) 55%);
    transform: rotate(-6deg);
    pointer-events:none;
    opacity:.55;
  }
  .introBox.glass::after{
    content:"";
    position:absolute;
    inset:0;
    background-image: radial-gradient(rgba(0,0,0,.06) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity:.12;
    mix-blend-mode: overlay;
    pointer-events:none;
  }
  .introHead{
    padding: 14px 16px 10px;
    font-weight: 1000;
    font-size: 16px;
    border-bottom: 1px solid rgba(0,0,0,.06);
    background: rgba(255,255,255,.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .introBody{
    position: relative;
    padding: 0;
    overflow: hidden;
    min-height: 190px;
    white-space: normal;
  }
  .introPage{
    white-space: pre-line;
    font-size: 14px;
    line-height: 1.7;
    font-weight: 800;
    color: #111;

    position: absolute;
    left: 16px;
    right: 16px;
    top: 16px;
    bottom: 16px;

    opacity: 0;
    transform: translateX(14px);
    transition: opacity .28s ease, transform .32s cubic-bezier(.2,.8,.2,1);
    pointer-events: none;
  }
  .introPage.isActive{
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }

  .introFooter{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 12px 14px;
    border-top: 1px solid rgba(0,0,0,.06);
    background: rgba(255,255,255,.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    position: relative;
    z-index: 3;
  }

  .supportBtn{
    text-decoration:none;
    font-weight:1000;
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 999px;
    color: rgba(10,10,10,.88);
    background: linear-gradient(135deg, rgba(255,255,255,.72), rgba(255,255,255,.40));
    border: 1px solid rgba(255,255,255,.45);
    box-shadow:
      0 12px 26px rgba(0,0,0,.16),
      inset 0 1px 0 rgba(255,255,255,.70);
    backdrop-filter: blur(12px) saturate(155%);
    -webkit-backdrop-filter: blur(12px) saturate(155%);
    white-space: nowrap;
  }
  .supportBtn:active{ transform: scale(.98); }

  @keyframes pulseGlow{
    0%   { box-shadow: 0 12px 26px rgba(0,0,0,.16), 0 0 0 0 rgba(0,128,255,.22), inset 0 1px 0 rgba(255,255,255,.70); }
    60%  { box-shadow: 0 12px 26px rgba(0,0,0,.16), 0 0 0 10px rgba(0,128,255,0), inset 0 1px 0 rgba(255,255,255,.70); }
    100% { box-shadow: 0 12px 26px rgba(0,0,0,.16), 0 0 0 0 rgba(0,128,255,0), inset 0 1px 0 rgba(255,255,255,.70); }
  }
  .pulse{ animation: pulseGlow 2.2s ease-in-out infinite; }

  .pager{
    display:flex;
    align-items:center;
    gap: 10px;
    user-select:none;
  }
  .pagerBtn{
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.45);
    background: linear-gradient(135deg, rgba(255,255,255,.72), rgba(255,255,255,.40));
    box-shadow: 0 10px 22px rgba(0,0,0,.12);
    backdrop-filter: blur(12px) saturate(155%);
    -webkit-backdrop-filter: blur(12px) saturate(155%);
    font-weight: 1000;
  }
  .pagerBtn:active{ transform: scale(.98); }

  .pagerCenter{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-width: 56px;
  }
  .pagerText{
    font-weight: 1000;
    font-size: 12px;
    color: rgba(0,0,0,.70);
    line-height: 1.1;
  }
  .dots{
    margin-top: 4px;
    display:flex;
    gap: 6px;
  }
  .dot{
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: rgba(0,0,0,.22);
  }
  .dot.isOn{ background: rgba(0,0,0,.55); }

  .introCloseBtn{
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.45);
    background: linear-gradient(135deg, rgba(255,255,255,.72), rgba(255,255,255,.40));
    box-shadow:
      0 10px 24px rgba(0,0,0,.16),
      inset 0 1px 0 rgba(255,255,255,.70);
    backdrop-filter: blur(12px) saturate(155%);
    -webkit-backdrop-filter: blur(12px) saturate(155%);
    font-weight: 1000;
  }
  .introCloseBtn:active{ transform: scale(.98); }

  .crownBadge{
    position:absolute;
    right:-8px;
    top:-16px;
    font-size:28px;
    transform: rotate(12deg);

<script>
const HEADER_IMAGE_URL = "https://i.imgur.com/nYBRUdd.png";
const FALLBACK_IMG = "data:image/gif;base64,R0lGODlhAQABAAAAACw=";

const HARD_MAX_SELECTED = 8;
const STORAGE_KEY  = "oshivote_selected_v6";
const SELECT_LIMIT_KEY = "oshivote_select_limit_v1";
const ACCENT_COLOR_KEY = "oshivote_accent_color_v1";
const SLOT_COLORS_KEY = "oshivote_slot_colors_v1";
const HANDLES_KEY = "oshivote_handles_v1";
const CROWNS_KEY = "oshivote_crowns_v1";

let slotColors = loadSlotColors();
let perSlotColorMode = false;
let colorTargetPos = null;
let handles = loadHandles();
let crowns = loadCrowns();
let showingCandidates = false;
let selectedLimit = loadSelectedLimit();

const WITHDRAWN_IDS = new Set([
  "horieito",
  "sakuraihikaru"
]);

function normalizeHexColor(c){
  if(!c) return "#0080ff";
  c = String(c).trim();
  if(/^#[0-9a-fA-F]{3}$/.test(c)){
    return "#" + c[1]+c[1] + c[2]+c[2] + c[3]+c[3];
  }
  if(/^#[0-9a-fA-F]{6}$/.test(c)) return c.toLowerCase();
  return "#0080ff";
}

function loadAccentColor(){
  try{
    const v = localStorage.getItem(ACCENT_COLOR_KEY);
    return normalizeHexColor(v);
  }catch(e){
    return "#0080ff";
  }
}
function saveAccentColor(color){
  try{ localStorage.setItem(ACCENT_COLOR_KEY, normalizeHexColor(color)); }catch(e){}
}
function updatePaletteUI(color){
  const c = normalizeHexColor(color);
  const swatches = document.querySelectorAll(".colorSwatch");
  swatches.forEach(el=>{
    const d = normalizeHexColor(el.getAttribute("data-color"));
    el.classList.toggle("active", d === c);
  });
  const picker = document.getElementById("colorPicker");
  if(picker) picker.value = c;
}
function applyAccentColor(color){
  const c = normalizeHexColor(color);
  document.documentElement.style.setProperty("--accent", c);
  updatePaletteUI(c);
}

function loadSlotColors(){
  try{
    const raw = localStorage.getItem(SLOT_COLORS_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return (obj && typeof obj === "object") ? obj : {};
  }catch(e){ return {}; }
}
function saveSlotColors(){
  try{ localStorage.setItem(SLOT_COLORS_KEY, JSON.stringify(slotColors)); }catch(e){}
}
function getColorForTraineeIndex(ti){
  const c = slotColors[String(ti)];
  return c ? normalizeHexColor(c) : loadAccentColor();
}
function setColorForTraineeIndex(ti, color){
  slotColors[String(ti)] = normalizeHexColor(color);
  saveSlotColors();
}

function toggleColorMode(){
  perSlotColorMode = !perSlotColorMode;
  colorTargetPos = null;

  const btn = document.getElementById("colorModeBtn");
  if(btn) btn.textContent = "色変更：" + (perSlotColorMode ? "枠別" : "全員");

  updatePaletteUI(loadAccentColor());
  drawPicks();
}
function setColorTarget(pos){
  if(!perSlotColorMode) return;
  if(pos < 0 || pos >= selected.length) return;
  colorTargetPos = pos;

  const ti = selected[pos];
  updatePaletteUI(getColorForTraineeIndex(ti));
  drawPicks();
}
function setAccentColor(color){
  const c = normalizeHexColor(color);

  if(perSlotColorMode && colorTargetPos !== null && colorTargetPos < selected.length){
    const ti = selected[colorTargetPos];
    setColorForTraineeIndex(ti, c);
    updatePaletteUI(c);
    drawPicks();
    drawExportPicks();
    return;
  }

  slotColors = {};
  saveSlotColors();

  saveAccentColor(c);
  applyAccentColor(c);
  drawPicks();
  drawExportPicks();
}

function loadCrowns(){
  try{
    const raw = localStorage.getItem(CROWNS_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return (obj && typeof obj === "object") ? obj : {};
  }catch(e){ return {}; }
}
function saveCrowns(){
  try{ localStorage.setItem(CROWNS_KEY, JSON.stringify(crowns)); }catch(e){}
}
function isCrowned(traineeIndex){
  return !!crowns[String(traineeIndex)];
}
function toggleCrown(traineeIndex){
  const k = String(traineeIndex);
  if(crowns[k]) delete crowns[k];
  else crowns[k] = true;
  saveCrowns();
}

function loadHandles(){
  try{
    const raw = localStorage.getItem(HANDLES_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return (obj && typeof obj === "object") ? obj : {};
  }catch(e){ return {}; }
}
function saveHandles(){
  try{ localStorage.setItem(HANDLES_KEY, JSON.stringify(handles)); }catch(e){}
}

function loadSelectedLimit(){
  try{
    const v = parseInt(localStorage.getItem(SELECT_LIMIT_KEY), 10);
    if(Number.isInteger(v) && v >= 1 && v <= 8) return v;
  }catch(e){}
  return 4;
}
function saveSelectedLimit(){
  try{ localStorage.setItem(SELECT_LIMIT_KEY, String(selectedLimit)); }catch(e){}
}
function updateLimitButtons(){
  document.querySelectorAll(".limitBtn").forEach(b=>{
    const n = parseInt(b.getAttribute("data-n"), 10);
    b.classList.toggle("limitBtnActive", n === selectedLimit);
  });
}
function setSelectedLimit(n){
  if(!Number.isInteger(n) || n < 1 || n > 8) return;
  selectedLimit = n;
  saveSelectedLimit();

  if(selected.length > selectedLimit){
    selected = selected.slice(0, selectedLimit);
    saveSelected();
    if(colorTargetPos !== null && colorTargetPos >= selected.length) colorTargetPos = null;
  }

  updateLimitButtons();
  drawPicks();
  drawMembers();
  drawExportPicks();
}

function profileUrlById(id){
  if(!id) return "https://produce101.jp/profile/detail/?lang=ja";
  return "https://produce101.jp/profile/detail/?id=" + encodeURIComponent(id) + "&lang=ja";
}
function displayName(full){
  return (full || "").replace(/\s*\([^)]*\)\s*/g, "").trim();
}
function alphaPart(full){
  const m = (full||"").match(/\(([^)]*)\)/);
  return m ? "(" + m[1] + ")" : "";
}
function withMembersScrollLock(fn){
  const wrap = document.getElementById("membersWrap");
  const prev = wrap ? wrap.scrollTop : 0;
  fn();
  requestAnimationFrame(() => { if(wrap) wrap.scrollTop = prev; });
}

let handleModalPos = null;

function editHandle(pos){
  if(pos < 0 || pos >= selected.length) return;

  handleModalPos = pos;

  const traineeIndex = selected[pos];
  const current = (handles[String(traineeIndex)] || "").trim();

  const modal = document.getElementById("handleModal");
  const input = document.getElementById("handleInput");
  const crownBtn = document.getElementById("crownBtn");
  if(!modal || !input || !crownBtn) return;

  input.value = current ? current : "@";
  crownBtn.classList.toggle("on", isCrowned(traineeIndex));

  modal.classList.add("show");
  modal.setAttribute("aria-hidden","false");

  setTimeout(() => {
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
  }, 0);
}
function closeHandleModal(){
  const modal = document.getElementById("handleModal");
  if(!modal) return;
  modal.classList.remove("show");
  modal.setAttribute("aria-hidden","true");
  handleModalPos = null;
}
function commitHandleFromModal(){
  if(handleModalPos === null) return;
  if(handleModalPos < 0 || handleModalPos >= selected.length) return;

  const traineeIndex = selected[handleModalPos];
  const input = document.getElementById("handleInput");
  if(!input) return;

  let next = String(input.value || "").trim();

  if(!next || next === "@"){
    delete handles[String(traineeIndex)];
    saveHandles();
    drawExportPicks();
    closeHandleModal();
    return;
  }
  if(next[0] !== "@") next = "@" + next;

  handles[String(traineeIndex)] = next;
  saveHandles();
  drawExportPicks();
  closeHandleModal();
}
function toggleCrownFromModal(){
  if(handleModalPos === null) return;
  if(handleModalPos < 0 || handleModalPos >= selected.length) return;

  const traineeIndex = selected[handleModalPos];
  toggleCrown(traineeIndex);

  const crownBtn = document.getElementById("crownBtn");
  if(crownBtn) crownBtn.classList.toggle("on", isCrowned(traineeIndex));

  drawPicks();
  drawExportPicks();
}

(function bindHandleModalEvents(){
  document.addEventListener("click", (e)=>{
    const modal = document.getElementById("handleModal");
    if(!modal || !modal.classList.contains("show")) return;
    if(e.target === modal) closeHandleModal();
  });
  document.addEventListener("keydown", (e)=>{
    const modal = document.getElementById("handleModal");
    if(!modal || !modal.classList.contains("show")) return;

    if(e.key === "Escape"){
      e.preventDefault();
      closeHandleModal();
    }
    if(e.key === "Enter"){
      e.preventDefault();
      commitHandleFromModal();
    }
  });
  const crownBtn = document.getElementById("crownBtn");
  if(crownBtn){
    crownBtn.addEventListener("click", (e)=>{
      e.preventDefault();
      toggleCrownFromModal();
    });
  }
})();

let introPage = 1;
function showIntroPage(n){
  const pages = Array.from(document.querySelectorAll("#introBody .introPage"));
  const max = pages.length || 2;
  introPage = Math.max(1, Math.min(max, n));

  pages.forEach(p=>{
    const pn = parseInt(p.getAttribute("data-page"), 10);
    p.classList.toggle("isActive", pn === introPage);
  });

  const pagerText = document.getElementById("pagerText");
  if(pagerText) pagerText.textContent = `${introPage}/${max}`;

  const dots = Array.from(document.querySelectorAll("#pagerDots .dot"));
  dots.forEach((d, i)=> d.classList.toggle("isOn", (i+1) === introPage));
}
function introNext(){ showIntroPage(introPage + 1); }
function introPrev(){ showIntroPage(introPage - 1); }

(function enableIntroSwipe(){
  const box = document.querySelector("#introModal .introBox");
  if(!box) return;

  let startX = 0;
  let startY = 0;
  let active = false;

  box.addEventListener("touchstart", (e)=>{
    if(!e.touches || e.touches.length !== 1) return;
    active = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, {passive:true});

  box.addEventListener("touchend", (e)=>{
    if(!active) return;
    active = false;

    const t = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0] : null;
    if(!t) return;

    const dx = t.clientX - startX;
    const dy = t.clientY - startY;

    if(Math.abs(dy) > Math.abs(dx)) return;

    const TH = 42;
    if(dx <= -TH) introNext();
    if(dx >=  TH) introPrev();
  }, {passive:true});
})();

function drawPicks(){
  const row = document.getElementById("picksRow");
  row.innerHTML = "";

  for(let i=0; i<selectedLimit; i++){
    const slot = document.createElement("div");

    if(i < selected.length){
      const ti = selected[i];
      const m = trainees[ti];
      const c = getColorForTraineeIndex(ti);
      const isTarget = perSlotColorMode && (colorTargetPos === i);

      slot.className = "slot" + (isTarget ? " colorTarget" : "");
      slot.innerHTML = `
        <div class="avatar" style="border-color:${c}"
             onclick="${perSlotColorMode ? `setColorTarget(${i})` : `editHandle(${i})`}">
          <img src="${m.img || FALLBACK_IMG}" alt="">
          ${isCrowned(ti) ? `<div class="crownBadge">👑</div>` : ``}
          <div class="rank" style="background:${c}">${i + 1}</div>
        </div>
        <div class="name" onclick="editHandle(${i})">${displayName(m.name)}</div>
        <div class="reorder">
          <button type="button" onclick="event.stopPropagation(); moveLeft(${i})">←</button>
          <button type="button" onclick="event.stopPropagation(); moveRight(${i})">→</button>
        </div>
      `;
    }else{
      slot.className = "slot empty";
      slot.innerHTML = `<div class="avatar">+</div>`;
    }
    row.appendChild(slot);
  }
}

function drawMembers(){
  const q = (document.getElementById("search").value || "").trim().toLowerCase();
  const membersEl = document.getElementById("members");
  membersEl.innerHTML = "";

  const start = showingCandidates ? TRAINEES_COUNT : 0;
  const end   = showingCandidates ? trainees.length : TRAINEES_COUNT;

  for(let i=start; i<end; i++){
    const m = trainees[i];
    if(q && (m.name||"").toLowerCase().indexOf(q) === -1) continue;

    const isWithdrawn = WITHDRAWN_IDS.has(m.id);
    const card = document.createElement("div");
    card.className = "memberCard"
      + (selected.indexOf(i) !== -1 ? " selected" : "")
      + (isWithdrawn ? " withdrawn" : "");

    const purl = profileUrlById(m.id);

    card.innerHTML = `
      <div class="memberCardThumb">
        <img src="${m.img || FALLBACK_IMG}" alt="">
        ${isWithdrawn ? `<div class="withdrawnBadge">※辞退</div>` : ``}
      </div>
      <div class="memberCardName">${displayName(m.name)}</div>
      <div class="memberCardSub">${alphaPart(m.name)}</div>
      <a class="memberCardProfile" href="${purl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">profile</a>
    `;

    if(!isWithdrawn){
      card.addEventListener("click", () => add(i));
    }
    membersEl.appendChild(card);
  }
}

function toggleCandidates(e){
  if(e && e.preventDefault) e.preventDefault();
  const wrap = document.getElementById("membersWrap");
  const listScroll = wrap ? wrap.scrollTop : 0;
  const winY = window.scrollY;

  showingCandidates = !showingCandidates;
  document.getElementById("toggleListBtn").textContent = showingCandidates ? "練習生" : "練習生候補";

  drawMembers();

  requestAnimationFrame(function(){
    if(wrap) wrap.scrollTop = listScroll;
    window.scrollTo(0, winY);
  });
}

function add(i){
  if(selected.length >= selectedLimit){ alert(selectedLimit + "人まで！"); return; }
  if(selected.indexOf(i) !== -1) return;

  const m = trainees[i];
  if(m && WITHDRAWN_IDS.has(m.id)) return;

  withMembersScrollLock(() => {
    selected.push(i);
    saveSelected();
    drawPicks();
    drawMembers();
    drawExportPicks();
  });
}
function undo(){
  withMembersScrollLock(() => {
    selected.pop();
    saveSelected();
    if(colorTargetPos !== null && colorTargetPos >= selected.length) colorTargetPos = null;
    drawPicks();
    drawMembers();
    drawExportPicks();
  });
}

    crowns = {};

function swap(a,b){
  if(a<0||b<0||a>=selected.length||b>=selected.length) return;
  withMembersScrollLock(() => {
    const t = selected[a]; selected[a]=selected[b]; selected[b]=t;
    saveSelected();
    if(colorTargetPos === a) colorTargetPos = b;
    else if(colorTargetPos === b) colorTargetPos = a;

    drawPicks(); drawMembers(); drawExportPicks();
  });
}

function exportPlanBySelectedCount(count){
  if(count <= 0) return [0,0];
  if(count <= 4) return [count, 0];
  if(count === 5) return [2,3];
  if(count === 6) return [3,3];
  if(count === 7) return [3,4];
  if(count === 8) return [4,4];
  return [Math.min(4,count), Math.max(0,count-4)];
}

function fitExportAvatar(count){
  const plan = exportPlanBySelectedCount(count);
  const maxCols = Math.max(plan[0], plan[1]);

  const availableW = 1004 - 56*2;
  const minAvatar = 96;
  let avatar = 112;
  let gapX = 56;

  if(maxCols <= 1){
    setExportVars(avatar, gapX, 30, 15);
    return;
  }

  while(true){
    const needW = avatar*maxCols + gapX*(maxCols-1);
    if(needW <= availableW) break;
    if(avatar <= minAvatar) break;
    avatar -= 2;
    gapX = Math.max(32, gapX - 2);
  }

  const border = Math.max(6, Math.round(avatar/14));
  document.documentElement.style.setProperty("--exBorder", border + "px");

  const name = Math.max(13, Math.min(15, Math.round(avatar/7.5)));
  setExportVars(avatar, gapX, 28, name);
}
function setExportVars(avatar, gapX, gapY, nameSize){
  document.documentElement.style.setProperty("--exAvatar", avatar + "px");
  document.documentElement.style.setProperty("--exGapX", gapX + "px");
  document.documentElement.style.setProperty("--exGapY", gapY + "px");
  document.documentElement.style.setProperty("--exName", nameSize + "px");
}

function setExportHandleSize(px){
  document.documentElement.style.setProperty("--exHandle", px + "px");
}
function fitExportHandlesUniform(){
  const els = Array.from(document.querySelectorAll("#exportInner .exportHandle"));
  if(!els.length) return;

  const MAX = 13;
  const MIN = 10;

  setExportHandleSize(MAX);

  const targets = els.filter(el => {
    const t = (el.textContent || "").trim();
    return t && t !== "";
  });

  if(!targets.length){
    setExportHandleSize(MAX);
    return;
  }

  for(let size = MAX; size >= MIN; size--){
    setExportHandleSize(size);
    const ok = targets.every(el => el.scrollWidth <= el.clientWidth);
    if(ok) return;
  }
  setExportHandleSize(MIN);
}

function drawExportPicks(){
  const row1 = document.getElementById("exportRow1");
  const row2 = document.getElementById("exportRow2");
  row1.innerHTML = "";
  row2.innerHTML = "";

  const count = selected.length;
  const plan = exportPlanBySelectedCount(count);
  const r1 = plan[0], r2 = plan[1];

  fitExportAvatar(count);

  let gapY = 30;
  const hasAnyHandle = selected.some(idx => (handles[String(idx)] || "").trim());
  if(r2 > 0 && hasAnyHandle) gapY = 38;
  document.documentElement.style.setProperty("--exGapY", gapY + "px");

  for(let i=0;i<r1;i++){
    row1.appendChild(makeExportSlot(trainees[selected[i]], i));
  }

  if(r2 > 0){
    row2.style.display = "flex";
    for(let j=0;j<r2;j++){
      const idx = r1 + j;
      row2.appendChild(makeExportSlot(trainees[selected[idx]], idx));
    }
  }else{
    row2.style.display = "none";
  }

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      fitExportHandlesUniform();
    });
  });
}

function makeExportSlot(m, orderIndex){
  const traineeIndex = selected[orderIndex];
  const handle = (handles[String(traineeIndex)] || "").trim();
  const c = getColorForTraineeIndex(traineeIndex);

  const d = document.createElement("div");
  d.className = "exportSlot";
  d.innerHTML = `
    <div class="exportAvatar" style="border-color:${c}">
      <div class="exportPhoto" style="background-image:url('${(m && m.img) ? m.img : FALLBACK_IMG}')"></div>
      ${isCrowned(traineeIndex) ? `<div class="exportCrownBadge">👑</div>` : ``}
      <div class="exportRank" style="background:${c}">${orderIndex + 1}</div>
    </div>
    <div class="exportName">${displayName(m && m.name ? m.name : "")}</div>
    <div class="exportHandle">${handle ? handle : "&nbsp;"}</div>
  `;
  return d;
}

async function saveImage(){
  if(typeof html2canvas === "undefined"){
    alert("画像保存ライブラリの読み込みに失敗しました。");
    return;
  }

  drawExportPicks();

  const toast = document.getElementById("toast");
  toast.style.display = "block";

  try{
    const target = document.getElementById("exportInner");
    const canvas = await html2canvas(target, {
      backgroundColor:"#ffffff",
      useCORS:true,
      allowTaint:false,
      scale: 5
    });
    const link = document.createElement("a");
    link.download = "oshivote_1004x1040.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  }catch(e){
    alert("画像生成に失敗しました。画像URL側の制限の可能性があります。");
  }finally{
    toast.style.display = "none";
  }
}

(function initAll(){
  openIntro();
  showIntroPage(1);

  const savedAccent = loadAccentColor();
  applyAccentColor(savedAccent);

  const cm = document.getElementById("colorModeBtn");
  if(cm) cm.textContent = "色変更：全員";

  if(selected.length > selectedLimit){
    selected = selected.slice(0, selectedLimit);
    saveSelected();
  }

  updateLimitButtons();
  drawPicks();
  drawMembers();
  drawExportPicks();
})();
</script>
