<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>日プ新世界メーカー</title>

<style>
  :root{
    --bg:#f6f6f6;
    --card:#ffffff;
    --line:#e6e6e6;
    --text:#111;
    --muted:#666;
    --shadow: 0 4px 14px rgba(0,0,0,.06);
    --radius:14px;

    --accent:#0080ff;
    --blue: var(--accent);

    --slot: 86px;
    --gap: 14px;

    /* 保存画像側：画像を大きめに */
    --exAvatar: 148px;
    --exBorder: 9px;
    --exGapX: 52px;
    --exGapY: 40px;
    --exName: 17px;
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family: system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  header{
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .topbar{
    padding: 8px 12px;
    max-width: 980px;
    margin: 0 auto;
    min-height: 12px;
  }
  h1{ display:none; }

  main{max-width:980px;margin:0 auto;padding:12px;}
  .card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  /* ===== 画面表示バナー ===== */
  .banner{
    height: 110px;
    position: relative;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,120,200,.30), transparent 40%),
      radial-gradient(circle at 80% 40%, rgba(120,160,255,.28), transparent 45%),
      linear-gradient(135deg, #ffe7f4, #eef3ff);
  }
  .banner.hasImage{ background-size: cover; background-position: center; }
  .banner::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(to bottom, rgba(255,255,255,.0), rgba(255,255,255,.35));
    pointer-events:none;
  }
  .bannerTitle{ display:none; }

  .countBadge{
    position:absolute;
    right: 12px;
    bottom: 12px;
    background: rgba(0,128,255,.92);
    color: #fff;
    font-weight: 900;
    padding: 10px 12px;
    border-radius: 999px;
    font-size: 14px;
    box-shadow: 0 8px 18px rgba(0,0,0,.14);
    z-index: 5;
    white-space: nowrap;
    pointer-events:none;
  }

  /* ===== 上：選択枠 ===== */
  .picksWrap{
    padding: 12px 14px 8px;
    background-image: url("https://i.imgur.com/lFGbXfI.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .picksRow{
    display:flex;
    justify-content:center;
    gap: var(--gap);
    flex-wrap: wrap;
    row-gap: 14px;
    padding: 12px 0 10px;
  }
  .slot{ width: var(--slot); text-align:center; }

  .avatar{
    width: var(--slot);
    height: var(--slot);
    border-radius:999px;
    border: 5px solid var(--blue);
    background:#fff;
    overflow: visible;
    box-shadow: 0 8px 18px rgba(0,0,0,.10);
    margin: 0 auto;
    position:relative;
    z-index: 1;
    cursor:pointer;
  }
  .avatar img{
    width:100%;
    height:100%;
    border-radius:999px;
    object-fit: cover;
    object-position: 50% 35%;
    display:block;
    image-rendering: auto;
    transform: translateZ(0);
    backface-visibility: hidden;
  }
  .rank{
    position:absolute;
    left:50%;
    bottom:-12px;
    transform: translateX(-50%);
    background: var(--blue);
    color:#fff;
    border-radius:999px;
    font-weight:900;
    font-size: 9px;
    padding: 6px 8px;
    line-height:1;
    min-width: 2em;
    text-align:center;
    z-index: 2;
    box-shadow: 0 6px 14px rgba(0,0,0,.18);
    pointer-events:none;
  }
  .name{
    margin-top: 14px;
    font-size: 12px;
    font-weight: 900;
    line-height: 1.1;
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
    cursor:pointer;
  }
  .empty .avatar{
    opacity:.16;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 34px;
    font-weight: 900;
    color:#555;
    cursor:default;
  }
  .empty .rank{display:none;}
  .empty .name{display:none;}

  .slot.colorTarget .avatar{
    outline: 4px solid rgba(0,0,0,.12);
    outline-offset: 3px;
  }

  .reorder{ display:none; gap:10px; justify-content:center; margin-top: 8px; }
  body.reorder-on .reorder{ display:flex; }
  .reorder button{
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid #ddd;
    background: #fff;
    font-size: 16px;
    line-height: 1;
  }

  .actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
    padding: 10px 10px 12px;
    border-top: 1px solid #f1f1f1;
    background:#fff;
  }
  button{
    padding: 11px 12px;
    border-radius: 12px;
    border: 1px solid #ddd;
    background: #fff;
    font-size: 14px;
  }
  button:active{transform:scale(.98)}
  .primary{border-color:#cfe2ff;}
  .danger{border-color:#ffd6d6;}
  .mode{border-color:#e7e7e7;}

  .tiktokBtn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding: 11px 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 900;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(135deg, #000000, #222222);
    border: 1px solid #111;
    box-shadow: 0 6px 14px rgba(0,0,0,.18);
  }
  .tiktokBtn:active{ transform: scale(.98); }
  .tiktokHint{
    margin-top: 6px;
    font-size: 13px;
    font-weight: 900;
    color: #555;
    text-align: center;
    letter-spacing: .02em;
  }
  .tiktokWrap{ display:flex; flex-direction:column; align-items:center; }

  /* ★人数ボタン */
  .countControl{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
  }
  .countLabel{ font-size:12px; font-weight:900; color:#666; }
  .countBtns{
    display:grid;
    grid-template-columns: repeat(4, 44px);
    gap:8px;
    justify-content:center;
  }
  .countBtnActive{ border-color:#cfe2ff; background:#eef6ff; font-weight:1000; }

  /* ★丸枠カラー変更UI */
  .colorControl{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    padding: 2px 6px;
  }
  .palette{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
  }
  .colorSwatch{
    width: 30px;
    height: 30px;
    border-radius: 999px;
    border: 2px solid rgba(0,0,0,.10);
    box-shadow: 0 6px 14px rgba(0,0,0,.10);
    cursor:pointer;
    background: #000;
  }
  .colorSwatch.active{
    outline: 3px solid rgba(0,0,0,.12);
    border-color: rgba(0,0,0,.25);
    transform: scale(1.03);
  }
  .colorPicker{
    width: 40px;
    height: 30px;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 0;
    background:#fff;
  }

  /* ===== 一覧 ===== */
  .listCard{
    margin-top: 12px;
    padding: 10px;
    background-image: url("https://i.imgur.com/lUMY5QA.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border:1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .sectionTitle{
    font-size: 18px;
    font-weight: 900;
    padding: 6px 2px 10px;
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.35);
  }

  .searchRow{ display:flex; gap:10px; align-items:center; margin-bottom: 10px; }
  .search{
    flex:1;
    display:flex;
    align-items:center;
    border:1px solid #ddd;
    border-radius: 12px;
    padding: 10px 12px;
    background:#fff;
  }
  .search input{ border:none; outline:none; width:100%; font-size: 15px; background:transparent; }

  #membersWrap{
    max-height: 52vh;
    overflow:auto;
    -webkit-overflow-scrolling: touch;
    border-top:1px solid #f1f1f1;
    padding-top: 6px;
    overscroll-behavior: contain;
  }
  .membersGrid{
    display:grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap:12px;
    padding: 10px 6px 6px;
  }
  .memberCard{
    border: 1px solid #e8e8e8;
    border-radius: 16px;
    background: #fff;
    box-shadow: 0 4px 14px rgba(0,0,0,.06);
    padding: 12px 10px 10px;
    cursor:pointer;
    user-select:none;
    text-align:center;
    position:relative;
  }
  .memberCard:active{ transform:scale(.99); }

  .memberCardThumb{
    width:100%;
    aspect-ratio: 1 / 1;
    border-radius: 14px;
    overflow:hidden;
    background:#f7f7f7;
    border:1px solid #f0f0f0;
    position: relative;
  }
  .memberCardThumb img{
    width:100%;
    height:100%;
    object-fit: cover;
    object-position: 50% 20%;
    display:block;
    image-rendering: auto;
    transform: translateZ(0);
    backface-visibility: hidden;
  }
  .memberCardName{ margin-top:10px; font-weight:900; font-size:14px; line-height:1.2; }
  .memberCardSub{ margin-top:4px; font-size:12px; color: var(--muted); }
  .memberCard.selected{ opacity:.35; filter: grayscale(1); pointer-events:none; }
  .memberCardProfile{
    position:absolute;
    right:10px;
    top:10px;
    font-size:12px;
    font-weight:900;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid #cfe2ff;
    color: var(--blue);
    background: rgba(255,255,255,.92);
    text-decoration:none;
    line-height:1;
  }

  .memberCard.withdrawn{
    opacity: .45;
    filter: grayscale(1);
    cursor: default;
  }
  .memberCard.withdrawn:active{ transform:none; }
  .withdrawnBadge{
    position: absolute;
    left: 10px;
    top: 10px;
    padding: 8px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,.9);
    border: 1px solid rgba(0,0,0,.08);
    font-weight: 1000;
    font-size: 12px;
    color: #111;
    box-shadow: 0 8px 18px rgba(0,0,0,.10);
  }
  .memberCard.withdrawn .memberCardProfile{ opacity:.65; }

  .toast{
    position: fixed;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    background: rgba(0,0,0,.78);
    color:#fff;
    padding: 10px 12px;
    border-radius: 999px;
    font-size: 13px;
    display:none;
    z-index:999;
  }

  /* ===== 保存専用 ===== */
  #exportArea{
    position: fixed;
    left: -10000px;
    top: 0;
    width: 1004px;
    height: 1040px;
    background: #ffffff;
    overflow: hidden;
  }
  #exportInner{
    width: 1004px;
    height: 1040px;
    position: relative;
    background:#fff;
    overflow:hidden;
    background-image: url("https://i.imgur.com/lFGbXfI.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .exportBanner{
    height: 150px;
    background-size: cover;
    background-position: center;
    position:relative;
  }
  .exportBanner::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(to bottom, rgba(255,255,255,.0), rgba(255,255,255,.35));
    pointer-events:none;
  }
  .exportTitlePill{ display:none; }

  .exportCredit{
    position:absolute;
    top: 18px;
    right: 22px;
    font-size: 14px;
    font-weight: 900;
    color: rgba(0,0,0,.55);
    background: rgba(255,255,255,.72);
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.85);
    z-index: 120;
    backdrop-filter: blur(6px);
    pointer-events:none;
  }

  .exportTikTok,
  .exportHashtag{
    position:absolute;
    bottom: 14px;
    z-index: 120;
    pointer-events:none;
    white-space: nowrap;
    background: linear-gradient(135deg, rgba(255,255,255,.72), rgba(255,255,255,.42));
    border: 1px solid rgba(255,255,255,.55);
    border-bottom-color: rgba(255,255,255,.32);
    border-right-color: rgba(255,255,255,.32);
    backdrop-filter: blur(12px) saturate(155%);
    -webkit-backdrop-filter: blur(12px) saturate(155%);
    box-shadow:
      0 14px 30px rgba(0,0,0,.14),
      inset 0 1px 0 rgba(255,255,255,.75),
      inset 0 -1px 0 rgba(255,255,255,.18);
    border-radius: 999px;
    padding: 8px 12px;
    color: rgba(10,10,10,.88);
    font-weight: 1000;
    text-shadow:
      0 1px 0 rgba(255,255,255,.70),
      0 0 6px rgba(255,255,255,.22);
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .exportTikTok::before,
  .exportHashtag::before{
    content:"";
    position:absolute;
    inset: 1px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(255,255,255,.55), rgba(255,255,255,0) 55%);
    pointer-events:none;
    mix-blend-mode: screen;
    opacity: .55;
  }
  .exportTikTok{ left: 18px; font-size: 14px; }
  .exportHashtag{ right: 18px; font-size: 13px; letter-spacing: .03em; }

  .exportBody{
    height: calc(1040px - 150px);
    padding: 18px 56px 120px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .exportRows{
    width: 100%;
    display:flex;
    flex-direction:column;
    gap: var(--exGapY);
    align-items:center;
    justify-content:center;
  }
  .exportRow{
    display:flex;
    justify-content:center;
    gap: var(--exGapX);
    width: 100%;
  }

  .exportSlot{
    width: calc(var(--exAvatar) + 100px);
    text-align:center;
    position: relative;
  }
  .exportAvatar{
    width: var(--exAvatar);
    height: var(--exAvatar);
    border-radius:999px;
    border: var(--exBorder) solid var(--blue);
    overflow: visible;
    background:#fff;
    margin: 0 auto;
    box-shadow: 0 10px 22px rgba(0,0,0,.10);
    position:relative;
  }
  .exportPhoto{
    width:100%;
    height:100%;
    border-radius:999px;
    background-size: cover;
    background-position: 50% 35%;
    background-repeat: no-repeat;
    image-rendering: auto;
    transform: translateZ(0);
    backface-visibility: hidden;
  }
  .exportRank{
    position:absolute;
    left:50%;
    bottom:-14px;
    transform: translateX(-50%);
    background: var(--blue);
    color:#fff;
    border-radius:999px;
    font-weight:900;
    font-size: 12px;
    padding: 7px 10px;
    line-height:1;
    min-width: 2.2em;
    text-align:center;
    box-shadow: 0 8px 16px rgba(0,0,0,.18);
    pointer-events:none;
  }
  .exportName{
    margin-top: 18px;
    font-size: var(--exName);
    font-weight: 900;
    line-height: 1.15;
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
  }

  .crownBadge{
    position:absolute;
    right:-8px;
    top:-16px;
    font-size:28px;
    transform: rotate(12deg);
    filter: drop-shadow(0 6px 10px rgba(0,0,0,.18));
    pointer-events:none;
    z-index: 5;
  }
  .exportCrownBadge{
    position:absolute;
    right:-12px;
    top:-22px;
    font-size:46px;
    transform: rotate(12deg);
    filter: drop-shadow(0 10px 16px rgba(0,0,0,.18));
    pointer-events:none;
    z-index: 5;
  }
</style>
</head>

<body>
<header>
  <div class="topbar"></div>
</header>

<main>
  <div class="card" id="picksCard">
    <div id="banner" class="banner">
      <div class="countBadge" id="countBadge">1人選択</div>
    </div>

    <div class="picksWrap" id="picksWrap">
      <div class="picksRow" id="picksRow"></div>
    </div>

    <div class="actions">
      <button class="primary" type="button" onclick="saveImage()">画像として保存</button>
      <button type="button" onclick="undo()">1人戻す</button>
      <button class="danger" type="button" onclick="resetAll()">リセット</button>
      <button class="mode" type="button" id="reorderBtn" onclick="toggleReorder()">並び替えモード：OFF</button>

      <div class="countControl">
        <div class="countLabel">人数</div>
        <div class="countBtns" id="countBtns">
          <button type="button" class="mode countBtn" data-n="1" onclick="setTargetCount(1)">1</button>
          <button type="button" class="mode countBtn" data-n="2" onclick="setTargetCount(2)">2</button>
          <button type="button" class="mode countBtn" data-n="3" onclick="setTargetCount(3)">3</button>
          <button type="button" class="mode countBtn" data-n="4" onclick="setTargetCount(4)">4</button>
          <button type="button" class="mode countBtn" data-n="5" onclick="setTargetCount(5)">5</button>
          <button type="button" class="mode countBtn" data-n="6" onclick="setTargetCount(6)">6</button>
          <button type="button" class="mode countBtn" data-n="7" onclick="setTargetCount(7)">7</button>
          <button type="button" class="mode countBtn" data-n="8" onclick="setTargetCount(8)">8</button>
        </div>
      </div>

      <div class="colorControl">
        <button class="mode" id="colorModeBtn" type="button" onclick="toggleColorMode()">色変更：全員</button>

        <div class="palette" id="palette">
          <div class="colorSwatch" data-color="#0080ff" style="background:#0080ff" title="ブルー" onclick="setAccentColor('#0080ff')"></div>
          <div class="colorSwatch" data-color="#ff4fa3" style="background:#ff4fa3" title="ピンク" onclick="setAccentColor('#ff4fa3')"></div>
          <div class="colorSwatch" data-color="#7a5cff" style="background:#7a5cff" title="パープル" onclick="setAccentColor('#7a5cff')"></div>
          <div class="colorSwatch" data-color="#23c16b" style="background:#23c16b" title="グリーン" onclick="setAccentColor('#23c16b')"></div>
          <div class="colorSwatch" data-color="#ff8a00" style="background:#ff8a00" title="オレンジ" onclick="setAccentColor('#ff8a00')"></div>
          <div class="colorSwatch" data-color="#111111" style="background:#111111" title="ブラック" onclick="setAccentColor('#111111')"></div>
          <input class="colorPicker" id="colorPicker" type="color" value="#0080ff" onchange="setAccentColor(this.value)" title="自由に選ぶ" />
        </div>
      </div>

      <div class="tiktokWrap">
        <a class="tiktokBtn" href="https://www.tiktok.com/@12agassi" target="_blank" rel="noopener">TikTokフォローお願い🥹</a>
        <div class="tiktokHint">↑ここをクリック</div>
      </div>
    </div>
  </div>

  <div class="listCard">
    <div class="sectionTitle">一覧（押して追加）</div>
    <div class="searchRow">
      <div class="search">
        <input id="search" type="text" placeholder="Search" oninput="drawMembers()" />
      </div>
      <button class="mode" id="toggleListBtn" type="button" onclick="toggleCandidates(event)">練習生候補</button>
    </div>

    <div id="membersWrap">
      <div id="members" class="membersGrid"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast">画像を生成中…</div>

<div id="exportArea" aria-hidden="true">
  <div id="exportInner">
    <div class="exportCredit">created by @12agassi</div>

    <div id="exportBanner" class="exportBanner"></div>

    <div class="exportBody">
      <div class="exportRows">
        <div class="exportRow" id="exportRow1"></div>
        <div class="exportRow" id="exportRow2"></div>
      </div>
    </div>

    <div class="exportTikTok" id="exportTikTok">TikTok:12agassi</div>
    <div class="exportHashtag" id="exportHashtag">#日プ新世界メーカー</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const HEADER_IMAGE_URL = "https://i.imgur.com/nYBRUdd.png";
const FALLBACK_IMG = "data:image/gif;base64,R0lGODlhAQABAAAAACw=";

const MAX_TARGET = 8;
const TARGET_COUNT_KEY = "oshivote_target_count_v1";
const STORAGE_KEY  = "oshivote_selected_v7";
const ACCENT_COLOR_KEY = "oshivote_accent_color_v1";
const SLOT_COLORS_KEY = "oshivote_slot_colors_v1";
const CROWNS_KEY = "oshivote_crowns_v1";

let slotColors = loadSlotColors();
let perSlotColorMode = false;
let colorTargetPos = null;
let crowns = loadCrowns();
let showingCandidates = false;
let targetCount = loadTargetCount();

const WITHDRAWN_IDS = new Set([
  "horieito",
  "sakuraihikaru"
]);

function normalizeHexColor(c){
  if(!c) return "#0080ff";
  c = String(c).trim();
  if(/^#[0-9a-fA-F]{3}$/.test(c)){
    return "#" + c[1]+c[1] + c[2]+c[2] + c[3]+c[3];
  }
  if(/^#[0-9a-fA-F]{6}$/.test(c)) return c.toLowerCase();
  return "#0080ff";
}

function loadAccentColor(){
  try{
    const v = localStorage.getItem(ACCENT_COLOR_KEY);
    return normalizeHexColor(v);
  }catch(e){
    return "#0080ff";
  }
}
function saveAccentColor(color){
  try{ localStorage.setItem(ACCENT_COLOR_KEY, normalizeHexColor(color)); }catch(e){}
}
function updatePaletteUI(color){
  const c = normalizeHexColor(color);
  document.querySelectorAll(".colorSwatch").forEach(el=>{
    const d = normalizeHexColor(el.getAttribute("data-color"));
    el.classList.toggle("active", d === c);
  });
  const picker = document.getElementById("colorPicker");
  if(picker) picker.value = c;
}
function applyAccentColor(color){
  const c = normalizeHexColor(color);
  document.documentElement.style.setProperty("--accent", c);
  updatePaletteUI(c);
}

function loadSlotColors(){
  try{
    const raw = localStorage.getItem(SLOT_COLORS_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return (obj && typeof obj === "object") ? obj : {};
  }catch(e){ return {}; }
}
function saveSlotColors(){
  try{ localStorage.setItem(SLOT_COLORS_KEY, JSON.stringify(slotColors)); }catch(e){}
}
function getColorForTraineeIndex(ti){
  const c = slotColors[String(ti)];
  return c ? normalizeHexColor(c) : loadAccentColor();
}
function setColorForTraineeIndex(ti, color){
  slotColors[String(ti)] = normalizeHexColor(color);
  saveSlotColors();
}

function toggleColorMode(){
  perSlotColorMode = !perSlotColorMode;
  colorTargetPos = null;
  const btn = document.getElementById("colorModeBtn");
  if(btn) btn.textContent = "色変更：" + (perSlotColorMode ? "枠別" : "全員");
  updatePaletteUI(loadAccentColor());
  drawPicks();
}
function setColorTarget(pos){
  if(!perSlotColorMode) return;
  if(pos < 0 || pos >= selected.length) return;
  colorTargetPos = pos;
  const ti = selected[pos];
  updatePaletteUI(getColorForTraineeIndex(ti));
  drawPicks();
}
function setAccentColor(color){
  const c = normalizeHexColor(color);

  if(perSlotColorMode && colorTargetPos !== null && colorTargetPos < selected.length){
    const ti = selected[colorTargetPos];
    setColorForTraineeIndex(ti, c);
    updatePaletteUI(c);
    drawPicks();
    drawExportPicks();
    return;
  }

  slotColors = {};
  saveSlotColors();

  saveAccentColor(c);
  applyAccentColor(c);
  drawPicks();
  drawExportPicks();
}

function loadCrowns(){
  try{
    const raw = localStorage.getItem(CROWNS_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    return (obj && typeof obj === "object") ? obj : {};
  }catch(e){ return {}; }
}
function saveCrowns(){
  try{ localStorage.setItem(CROWNS_KEY, JSON.stringify(crowns)); }catch(e){}
}
function isCrowned(traineeIndex){
  return !!crowns[String(traineeIndex)];
}
function toggleCrown(traineeIndex){
  const k = String(traineeIndex);
  if(crowns[k]) delete crowns[k];
  else crowns[k] = true;
  saveCrowns();
}

function profileUrlById(id){
  if(!id) return "https://produce101.jp/profile/detail/?lang=ja";
  return "https://produce101.jp/profile/detail/?id=" + encodeURIComponent(id) + "&lang=ja";
}
function displayName(full){
  return (full || "").replace(/\s*\([^)]*\)\s*/g, "").trim();
}
function alphaPart(full){
  const m = (full||"").match(/\(([^)]*)\)/);
  return m ? "(" + m[1] + ")" : "";
}
function withMembersScrollLock(fn){
  const wrap = document.getElementById("membersWrap");
  const prev = wrap ? wrap.scrollTop : 0;
  fn();
  requestAnimationFrame(() => { if(wrap) wrap.scrollTop = prev; });
}

function loadTargetCount(){
  try{
    const v = parseInt(localStorage.getItem(TARGET_COUNT_KEY), 10);
    if(Number.isFinite(v) && v >= 1 && v <= 8) return v;
  }catch(e){}
  return 1;
}
function saveTargetCount(){
  try{ localStorage.setItem(TARGET_COUNT_KEY, String(targetCount)); }catch(e){}
}
function updateCountButtons(){
  document.querySelectorAll(".countBtn").forEach(b=>{
    const n = parseInt(b.getAttribute("data-n"), 10);
    b.classList.toggle("countBtnActive", n === targetCount);
  });
  const badge = document.getElementById("countBadge");
  if(badge) badge.textContent = `${targetCount}人選択`;
}
function setTargetCount(n){
  if(!Number.isInteger(n) || n < 1 || n > 8) return;
  targetCount = n;
  saveTargetCount();
  if(selected.length > targetCount){
    selected = selected.slice(0, targetCount);
    saveSelected();
  }
  if(colorTargetPos !== null && colorTargetPos >= selected.length) colorTargetPos = null;
  updateCountButtons();
  drawPicks();
  drawMembers();
  drawExportPicks();
}

/* ===== 画面：選択枠 ===== */
function toggleCrownFromPick(pos){
  if(pos < 0 || pos >= selected.length) return;
  const traineeIndex = selected[pos];
  toggleCrown(traineeIndex);
  drawPicks();
  drawExportPicks();
}

function drawPicks(){
  const row = document.getElementById("picksRow");
  row.innerHTML = "";

  for(let i=0; i<targetCount; i++){
    const slot = document.createElement("div");

    if(i < selected.length){
      const ti = selected[i];
      const m = trainees[ti];
      const c = getColorForTraineeIndex(ti);
      const isTarget = perSlotColorMode && (colorTargetPos === i);

      slot.className = "slot" + (isTarget ? " colorTarget" : "");
      slot.innerHTML = `
        <div class="avatar" style="border-color:${c}"
             onclick="${perSlotColorMode ? `setColorTarget(${i})` : `toggleCrownFromPick(${i})`}">
          <img src="${m.img || FALLBACK_IMG}" alt="">
          ${isCrowned(ti) ? `<div class="crownBadge">👑</div>` : ``}
          <div class="rank" style="background:${c}">${i + 1}</div>
        </div>
        <div class="name" onclick="${perSlotColorMode ? `setColorTarget(${i})` : `toggleCrownFromPick(${i})`}">${displayName(m.name)}</div>
        <div class="reorder">
          <button type="button" onclick="event.stopPropagation(); moveLeft(${i})">←</button>
          <button type="button" onclick="event.stopPropagation(); moveRight(${i})">→</button>
        </div>
      `;
    }else{
      slot.className = "slot empty";
      slot.innerHTML = `<div class="avatar">+</div>`;
    }
    row.appendChild(slot);
  }
}

/* ===== 一覧 ===== */
function drawMembers(){
  const q = (document.getElementById("search").value || "").trim().toLowerCase();
  const membersEl = document.getElementById("members");
  membersEl.innerHTML = "";

  const start = showingCandidates ? TRAINEES_COUNT : 0;
  const end   = showingCandidates ? trainees.length : TRAINEES_COUNT;

  for(let i=start; i<end; i++){
    const m = trainees[i];
    if(q && (m.name||"").toLowerCase().indexOf(q) === -1) continue;

    const isWithdrawn = WITHDRAWN_IDS.has(m.id);
    const card = document.createElement("div");
    card.className = "memberCard"
      + (selected.indexOf(i) !== -1 ? " selected" : "")
      + (isWithdrawn ? " withdrawn" : "");

    const purl = profileUrlById(m.id);

    card.innerHTML = `
      <div class="memberCardThumb">
        <img src="${m.img || FALLBACK_IMG}" alt="">
        ${isWithdrawn ? `<div class="withdrawnBadge">※辞退</div>` : ``}
      </div>
      <div class="memberCardName">${displayName(m.name)}</div>
      <div class="memberCardSub">${alphaPart(m.name)}</div>
      <a class="memberCardProfile" href="${purl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">profile</a>
    `;

    if(!isWithdrawn){
      card.addEventListener("click", () => add(i));
    }
    membersEl.appendChild(card);
  }
}

function toggleCandidates(e){
  if(e && e.preventDefault) e.preventDefault();
  const wrap = document.getElementById("membersWrap");
  const listScroll = wrap ? wrap.scrollTop : 0;
  const winY = window.scrollY;

  showingCandidates = !showingCandidates;
  document.getElementById("toggleListBtn").textContent = showingCandidates ? "練習生" : "練習生候補";

  drawMembers();

  requestAnimationFrame(function(){
    if(wrap) wrap.scrollTop = listScroll;
    window.scrollTo(0, winY);
  });
}

function add(i){
  if(selected.length >= targetCount){ alert(targetCount + "人まで！"); return; }
  if(selected.indexOf(i) !== -1) return;

  const m = trainees[i];
  if(m && WITHDRAWN_IDS.has(m.id)) return;

  withMembersScrollLock(() => {
    selected.push(i);
    saveSelected();
    drawPicks();
    drawMembers();
    drawExportPicks();
  });
}
function undo(){
  withMembersScrollLock(() => {
    selected.pop();
    saveSelected();
    if(colorTargetPos !== null && colorTargetPos >= selected.length) colorTargetPos = null;
    drawPicks();
    drawMembers();
    drawExportPicks();
  });
}
function resetAll(){
  withMembersScrollLock(() => {
    selected = [];
    saveSelected();

    crowns = {};
    saveCrowns();

    slotColors = {};
    saveSlotColors();

    perSlotColorMode = false;
    colorTargetPos = null;
    const cm = document.getElementById("colorModeBtn");
    if(cm) cm.textContent = "色変更：全員";

    setAccentColor("#0080ff");

    drawPicks();
    drawMembers();
    drawExportPicks();
  });
}

/* 並び替え */
let reorderMode = false;
function toggleReorder(){
  reorderMode = !reorderMode;
  document.body.classList.toggle("reorder-on", reorderMode);
  document.getElementById("reorderBtn").textContent = "並び替えモード：" + (reorderMode ? "ON" : "OFF");
}
function swap(a,b){
  if(a<0||b<0||a>=selected.length||b>=selected.length) return;
  withMembersScrollLock(() => {
    const t = selected[a]; selected[a]=selected[b]; selected[b]=t;
    saveSelected();
    if(colorTargetPos === a) colorTargetPos = b;
    else if(colorTargetPos === b) colorTargetPos = a;
    drawPicks(); drawMembers(); drawExportPicks();
  });
}
function moveLeft(pos){ swap(pos, pos-1); }
function moveRight(pos){ swap(pos, pos+1); }

function saveSelected(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(selected)); }catch(e){}
}
function loadSelected(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr.filter(n => Number.isInteger(n)) : [];
  }catch(e){ return []; }
}

/* ===== 保存画像並び ===== */
function exportPlanBySelectedCount(count){
  if(count <= 0) return [0,0];
  if(count <= 4) return [count, 0];
  if(count === 5) return [2,3];
  if(count === 6) return [3,3];
  if(count === 7) return [3,4];
  if(count === 8) return [4,4];
  return [Math.min(4,count), Math.max(0,count-4)];
}

function fitExportAvatar(count){
  const plan = exportPlanBySelectedCount(count);
  const maxCols = Math.max(plan[0], plan[1]);
  const availableW = 1004 - 56*2;

  let avatar = 148;
  let gapX = 52;
  const minAvatar = 124;

  if(maxCols <= 1){
    setExportVars(avatar, gapX, 42, 17);
    return;
  }

  while(true){
    const needW = avatar*maxCols + gapX*(maxCols-1);
    if(needW <= availableW) break;
    if(avatar <= minAvatar) break;
    avatar -= 2;
    gapX = Math.max(28, gapX - 2);
  }

  const border = Math.max(7, Math.round(avatar/16));
  document.documentElement.style.setProperty("--exBorder", border + "px");

  const name = Math.max(14, Math.min(17, Math.round(avatar/8)));
  setExportVars(avatar, gapX, 40, name);
}
function setExportVars(avatar, gapX, gapY, nameSize){
  document.documentElement.style.setProperty("--exAvatar", avatar + "px");
  document.documentElement.style.setProperty("--exGapX", gapX + "px");
  document.documentElement.style.setProperty("--exGapY", gapY + "px");
  document.documentElement.style.setProperty("--exName", nameSize + "px");
}

function drawExportPicks(){
  const row1 = document.getElementById("exportRow1");
  const row2 = document.getElementById("exportRow2");
  row1.innerHTML = "";
  row2.innerHTML = "";

  const count = selected.length;
  const plan = exportPlanBySelectedCount(count);
  const r1 = plan[0], r2 = plan[1];

  fitExportAvatar(Math.max(count, 1));

  for(let i=0;i<r1;i++){
    row1.appendChild(makeExportSlot(trainees[selected[i]], i));
  }

  if(r2 > 0){
    row2.style.display = "flex";
    for(let j=0;j<r2;j++){
      const idx = r1 + j;
      row2.appendChild(makeExportSlot(trainees[selected[idx]], idx));
    }
  }else{
    row2.style.display = "none";
  }
}

function makeExportSlot(m, orderIndex){
  const traineeIndex = selected[orderIndex];
  const c = getColorForTraineeIndex(traineeIndex);

  const d = document.createElement("div");
  d.className = "exportSlot";
  d.innerHTML = `
    <div class="exportAvatar" style="border-color:${c}">
      <div class="exportPhoto" style="background-image:url('${(m && m.img) ? m.img : FALLBACK_IMG}')"></div>
      ${isCrowned(traineeIndex) ? `<div class="exportCrownBadge">👑</div>` : ``}
      <div class="exportRank" style="background:${c}">${orderIndex + 1}</div>
    </div>
    <div class="exportName">${displayName(m && m.name ? m.name : "")}</div>
  `;
  return d;
}

async function saveImage(){
  if(typeof html2canvas === "undefined"){
    alert("画像保存ライブラリの読み込みに失敗しました。");
    return;
  }

  if(selected.length === 0){
    alert("先に練習生を選んでね！");
    return;
  }

  drawExportPicks();

  const toast = document.getElementById("toast");
  toast.style.display = "block";

  try{
    const target = document.getElementById("exportInner");
    const canvas = await html2canvas(target, {
      backgroundColor:"#ffffff",
      useCORS:true,
      allowTaint:false,
      scale: 5
    });
    const link = document.createElement("a");
    link.download = "nipu_maker_1004x1040.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  }catch(e){
    alert("画像生成に失敗しました。画像URL側の制限の可能性があります。");
  }finally{
    toast.style.display = "none";
  }
}

/* 初期描画 */
(function initAll(){
  const savedAccent = loadAccentColor();
  applyAccentColor(savedAccent);

  const cm = document.getElementById("colorModeBtn");
  if(cm) cm.textContent = "色変更：全員";

  updateCountButtons();
  drawPicks();
  drawMembers();
  drawExportPicks();
})();
</script>
